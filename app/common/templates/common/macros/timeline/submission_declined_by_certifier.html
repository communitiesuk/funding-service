<div class="moj-timeline__item">
  <div class="moj-timeline__header">
    <h2 class="moj-timeline__title">{{ item.source.submission.collection.type.constants.singular | capitalize }} declined by certifier</h2>
    <p class="moj-timeline__byline">by {{ item.source.submission.grant_recipient.organisation.name }}</p>
  </div>
  <p class="moj-timeline__date">
    <strong>{{ item.source.created_by.name or item.source.created_by.email }}</strong> on
    <time datetime="{{ iso_utc(item.datetime) }}">{{ format_datetime_short(item.datetime) }}</time>
  </p>
</div>
